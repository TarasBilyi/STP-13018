<section class="gallery" id="gallery">
  <div class="container">
    <h2 class="section-title">Gallery</h2>
    <div class="swiper" data-gallery-swiper>
      <div class="swiper-wrapper">
        <div class="swiper-slide">
          <img
            src="./img/gallery/img-1.jpg"
            srcset="./img/gallery/img-1.jpg 1x, ./img/gallery/img-1@2x.jpg 2x"
            alt="Gallery Image 1"
            loading="lazy"
          />
        </div>

        <div class="swiper-slide">
          <img
            src="./img/gallery/img-2.jpg"
            srcset="./img/gallery/img-2.jpg 1x, ./img/gallery/img-2@2x.jpg 2x"
            alt="Gallery Image 2"
            loading="lazy"
          />
        </div>

        <div class="swiper-slide">
          <img
            src="./img/gallery/img-3.jpg"
            srcset="./img/gallery/img-3.jpg 1x, ./img/gallery/img-3@2x.jpg 2x"
            alt="Gallery Image 3"
            loading="lazy"
          />
        </div>

        <div class="swiper-slide">
          <img
            src="./img/gallery/img-4.jpg"
            srcset="./img/gallery/img-4.jpg 1x, ./img/gallery/img-4@2x.jpg 2x"
            alt="Gallery Image 4"
            loading="lazy"
          />
        </div>

        <div class="swiper-slide">
          <img
            src="./img/gallery/img-5.jpg"
            srcset="./img/gallery/img-5.jpg 1x, ./img/gallery/img-5@2x.jpg 2x"
            alt="Gallery Image 5"
            loading="lazy"
          />
        </div>
      </div>

      <div class="swiper-pagination" data-swiper-pagination></div>
    </div>
  </div>
</section>
