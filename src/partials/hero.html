<section class="hero">
  <div class="container">
    <div class="hero-content">
      <h1 class="hero-title">Match Miracle: Triple 3D Game</h1>
      <img
        class="hero-img"
        src="./img/hero/hero-img.png"
        srcset="./img/hero/hero-img.png 1x, ./img/hero/hero-img@2x.png 2x"
        alt="image of a phone with a game Match miracle"
        width="750"
        height="579"
        loading="lazy"
      />
      <div class="hero-wrap">
        <p class="text-prompting">Find it. Match it. Clear the chaos.</p>
        <p class="hero-text">

        </p>
        <p class="hero-desc">

        </p>

          target="_blank"
          href="https://play.google.com/store/apps/details?id=com.tile.triplematch.matching&hl=en"
        >
          <svg width="24" height="24" class="icon">
            <use href="./img/sprite.svg#icon-google-play"></use>
          </svg>
          <div class="link-text-wrap">
            <p class="link-text-smole">Get it on</p>
            <p class="link-text-big">GOOGLE PLAY</p>
          </div>
        </a>
      </div>
    </div>
  </div>
